<!DOCTYPE html>
<html lang="zh-CN">
<head>
       <meta charset="UTF-8">
       <title>上课页面</title>
       <style>
           body {
               background-color: white;
               font-family: Arial, sans-serif;
               margin: 0;
               padding: 0;
           }
           .header {
               background-color: #007bff;
               color: white;
               text-align: center;
               padding: 10px 0;
           }
           .navbar {
               overflow: hidden;
               background-color: #333;
               text-align: center; /* 使导航栏内容居中 */
           }
           .navbar a {
               display: inline-block; /* 使链接并排显示 */
               color: #f2f2f2;
               text-align: center;
               padding: 14px 16px;
               text-decoration: none;
           }
           .navbar a:hover {
               background-color: #ddd;
               color: black;
           }
           .video-upload {
               margin: 20px;
               text-align: center;
           }
       </style>
</head>
<body>

<div class="header">
       <h1 style="margin: 0; font-weight: bold;">光彩集团</h1>
</div>

<div class="navbar">
       <a href="#home">首页</a>
       <a href="#oj">OJ</a>
       <a href="#class">去上课</a>
       <a href="#contact">联系方式</a>
</div>

<div class="video-upload">
       <h2>上传视频</h2>
       <input type="file" id="videoFile" accept="video/*">
</div>

</body>
</html>
